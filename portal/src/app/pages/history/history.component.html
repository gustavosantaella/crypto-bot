<div class="container" style="padding: 2rem; max-width: 1000px; margin: 0 auto;">
  <header style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
    <div>
      <h2 class="gradient-text" style="font-size: 2rem; margin: 0;">Market RSI History</h2>
      <div style="display: flex; align-items: center; gap: 1rem; margin-top: 0.5rem;">
        <p style="color: var(--text-muted); margin: 0; font-size: 0.85rem;">Showing {{ allPriceLogs.length }} entries</p>
        <div style="display: flex; align-items: center; gap: 0.5rem; background: rgba(255,255,255,0.03); padding: 0.2rem 0.6rem; border-radius: 6px; border: 1px solid var(--border);">
          <label style="font-size: 0.6rem; color: var(--text-muted);">FROM</label>
          <input type="date" [(ngModel)]="startDate" (change)="loadPage(1)" style="background: transparent; border: none; color: var(--primary); font-size: 0.75rem;">
          <label style="font-size: 0.6rem; color: var(--text-muted);">TO</label>
          <input type="date" [(ngModel)]="endDate" (change)="loadPage(1)" style="background: transparent; border: none; color: var(--primary); font-size: 0.75rem;">
        </div>
      </div>
    </div>
    <button (click)="goBack()" class="btn-primary" style="padding: 0.6rem 1.2rem;">
      ← BACK TO TERMINAL
    </button>
  </header>

  <div class="glass-card" style="margin-bottom: 2rem; padding: 1.5rem;">
    <div style="height: 300px; position: relative;">
      <canvas id="rsiChart"></canvas>
    </div>
  </div>

  <div class="glass-card" style="padding: 0;">
    <table class="trade-table">
      <thead>
        <tr>
          <th>Timestamp</th>
          <th>Symbol</th>
          <th>Market Price</th>
          <th>RSI Indicator</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let log of allPriceLogs">
          <td class="muted">{{ formatDate(log.timestamp) }}</td>
          <td class="bold">{{ log.symbol }}</td>
          <td class="bold">${{ formatPrice(log.price) }}</td>
          <td>
            <span [class]="log.rsi > 65 ? 'rsi-tag danger' : (log.rsi < 35 ? 'rsi-tag success' : 'rsi-tag')">
              RSI: {{ log.rsi | number:'1.1-1' }}
            </span>
          </td>
        </tr>
      </tbody>
    </table>
    
    <div *ngIf="allPriceLogs.length === 0" style="padding: 4rem; text-align: center; color: var(--text-muted);">
      No history logs found in database.
    </div>

    <!-- Pagination Controls -->
    <div class="card-footer" style="padding: 1.5rem; display: flex; justify-content: center; gap: 1rem; border-top: 1px solid var(--border);">
      <button 
        [disabled]="currentPage === 1" 
        (click)="loadPage(currentPage - 1)" 
        class="btn-secondary" 
        style="padding: 0.5rem 1rem; opacity: currentPage === 1 ? 0.3 : 1;">
        PREVIOUS
      </button>
      
      <div style="display: flex; align-items: center; gap: 0.5rem; color: var(--text-muted); font-size: 0.85rem;">
        Page <span style="color: var(--primary); font-weight: 800;">{{ currentPage }}</span> of {{ totalPages }}
      </div>

      <button 
        [disabled]="currentPage >= totalPages" 
        (click)="loadPage(currentPage + 1)" 
        class="btn-secondary" 
        style="padding: 0.5rem 1rem; opacity: currentPage >= totalPages ? 0.3 : 1;">
        NEXT
      </button>
    </div>
  </div>
</div>
